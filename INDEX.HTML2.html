<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shaurya Coin Flipper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d2021 0%, #1a3a3a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 320px;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 1px;
            color: #f5f5f0;
        }

        /* Stats Dashboard */
        .stats-board {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item span {
            display: block;
            font-size: 18px;
            font-weight: 800;
            margin-top: 2px;
        }

        #headsCount { color: #4ca6a6; }
        #tailsCount { color: #fffff0; }

        /* 3D Coin Wrapper */
        .coin-wrapper {
            perspective: 1000px;
            width: 150px;
            height: 150px;
            margin: 25px auto;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 4px solid #f5f5f0;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.4);
        }

        /* HEADS SIDE: Radiant Teal */
        .heads {
            background: linear-gradient(45deg, #005a5b, #008080, #4ca6a6);
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* TAILS SIDE: Classic Ivory */
        .tails {
            background: linear-gradient(45deg, #fffff0, #f5f5f0, #e6e6da);
            color: #004d4d;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transform: rotateY(180deg);
        }

        /* Flip Keyframes Animation */
        @keyframes spin-heads {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(1800deg); } 
        }

        @keyframes spin-tails {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(1980deg); } 
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 15px;
        }

        button {
            background: #008080;
            color: #fffff0;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 128, 128, 0.4);
            width: 80%;
        }

        button:hover {
            transform: scale(1.05);
            background: #009999;
            box-shadow: 0 6px 20px rgba(0, 128, 128, 0.6);
        }

        button:disabled {
            background: #2b4040;
            color: #667a7a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .reset-btn {
            background: transparent;
            color: #667a7a;
            border: 1px solid #2b4040;
            padding: 8px 20px;
            font-size: 14px;
            border-radius: 50px;
            box-shadow: none;
            width: auto;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fffff0;
            border-color: #fffff0;
            box-shadow: none;
        }

        #resultText {
            font-size: 22px;
            margin-top: 20px;
            font-weight: 700;
            min-height: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Live Counters -->
        <div class="stats-board">
            <div class="stat-item">HEADS <span id="headsCount">0</span></div>
            <div class="stat-item">TOTAL <span id="totalCount">0</span></div>
            <div class="stat-item">TAILS <span id="tailsCount">0</span></div>
        </div>

        <h1>🪙 Shaurya's Coin Flipper</h1>
        
        <div class="coin-wrapper">
            <div class="coin" id="coin">
                <div class="side heads">SHAURYA</div>
                <div class="side tails">SHAURYA</div>
            </div>
        </div>

        <div id="resultText">Click to flip!</div>

        <div class="button-group">
            <button id="flipBtn" onclick="flipCoin()">Flip Coin</button>
            <button id="resetBtn" class="reset-btn" onclick="resetStats()">Reset Stats</button>
        </div>
    </div>
    <script>
        let heads = 0;
        let tails = 0;
        let total = 0;

        // Custom audio synthesizer
        function playCoinSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'spin') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(850, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.12);
                } 
                else if (type === 'headsLanding') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(950, ctx.currentTime);
                    osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.15);
                } 
                else if (type === 'tailsLanding') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(450, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.35, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.1);
                }
            } catch (e) {
                console.log("Audio play blocked or unsupported:", e);
            }
        }

        function flipCoin() {
            const coin = document.getElementById('coin');
            const flipBtn = document.getElementById('flipBtn');
            const resetBtn = document.getElementById('resetBtn');
            const resultText = document.getElementById('resultText');

            // 1. Disable buttons immediately
            flipBtn.disabled = true;
            resetBtn.disabled = true;
            resultText.innerText = "Flipping...";
            resultText.style.color = "#f5f5f0";

            playCoinSound('spin');

            // 2. Clear old animations completely 
            coin.style.animation = 'none';
            coin.offsetHeight; // Forces a reflow layout recalculation

            // 3. Select landing side
            const isHeads = Math.random() < 0.5;

            // 4. Inject 0.8s CSS style injection directly
            if (isHeads) {
                coin.style.animation = 'spin-heads 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.15)';
            } else {
                coin.style.animation = 'spin-tails 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.15)';
            }

            // 5. Execution timing trigger
            setTimeout(() => {
                total++;
                if (isHeads) {
                    heads++;
                    playCoinSound('headsLanding');
                    resultText.innerText = "🎉 Result: HEADS (Teal)";
                    resultText.style.color = "#4ca6a6";
                } else {
                    tails++;
                    playCoinSound('tailsLanding');
                    resultText.innerText = "🎉 Result: TAILS (Ivory)";
                    resultText.style.color = "#fffff0";
                }

                document.getElementById('headsCount').innerText = heads;
                document.getElementById('tailsCount').innerText = tails;
                document.getElementById('totalCount').innerText = total;

                flipBtn.disabled = false;
                resetBtn.disabled = false;
            }, 800);
        }

        function resetStats() {
            heads = 0;
            tails = 0;
            total = 0;
            
            // Clean out text layouts
            document.getElementById('headsCount').innerText = "0";
            document.getElementById('tailsCount').innerText = "0";
            document.getElementById('totalCount').innerText = "0";
            document.getElementById('resultText').innerText = "Click to flip!";
            document.getElementById('resultText').style.color = "#f5f5f0";
            
            // Re-center coin orientation state
            const coin = document.getElementById('coin');
            coin.style.animation = 'none';
            
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                osc.start(); osc.stop(ctx.currentTime + 0.05);
            } catch(e){}
        }
    </script>

</body>
</html>
